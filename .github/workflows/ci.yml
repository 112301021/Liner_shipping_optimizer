name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        working-directory: shipping_optimizer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests (no LLM required)
        working-directory: shipping_optimizer
        env:
          OPENROUTER_API_KEY: sk-or-dummy-key-for-ci
          ORCHESTRATOR_MODEL: meta-llama/llama-3.1-8b-instruct
          REGIONAL_MODEL: meta-llama/llama-3.1-8b-instruct
        run: |
          pytest tests/test_clustering.py tests/test_data_loader.py \
                 tests/test_service_generation.py -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Lint
        working-directory: shipping_optimizer
        run: ruff check src/ backend/ --ignore E501,E402

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: shipping_optimizer
        run: docker build -t liner-shipping-optimizer:${{ github.sha }} .
